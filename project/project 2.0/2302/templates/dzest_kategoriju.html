<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <title>Dzēst kategoriju</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    {% include "_header.html" %}
    <main class="page-wrap">
        <div class="page-head">
            <h1>Dzēst kategoriju</h1>
        </div>
        <form action="/dzest_kategoriju" method="post" class="form-card">
            <label>Izvēlieties kategoriju</label>
            <select name="kategorija_id" required>
                {% for kategorija in kategorijas %}
                    <option value="{{ kategorija.id }}">{{ kategorija.nosaukums }}</option>
                {% endfor %}
            </select>
            <button type="submit">Dzēst</button>
        </form>
    </main>
    {% include "_footer.html" %}
</body>
</html>
