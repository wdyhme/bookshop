<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dzēst autoru</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    {% include "_header.html" %}
    <main class="page-wrap">
        <div class="page-head">
            <h1>Dzēst autoru</h1>
        </div>
        <form action="/dzest_autoru" method="post" class="form-card">
            <label for="autors_id">Izvēlieties autoru</label>
            <select id="autors_id" name="autors_id" required>
                {% for autors in autori %}
                    <option value="{{ autors.id }}">{{ autors.vards }}</option>
                {% endfor %}
            </select>
            <button type="submit">Dzēst</button>
        </form>
    </main>
    {% include "_footer.html" %}
</body>
</html>
